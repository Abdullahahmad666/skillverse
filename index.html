<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fonts: preconnect so the handshake happens early, then load the
         stylesheet non-render-blocking (media=print flips to all on load).
         Combined with display=swap, text paints immediately in a fallback. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
      />
    </noscript>

    <title>SkillVerse — learn any skill, with people learning beside you</title>
    <meta
      name="description"
      content="Curated step-by-step roadmaps for Web Development, Python, and UX Design — vetted free resources, real projects, streaks, and a cohort that starts with you. Free forever."
    />
    <meta name="theme-color" content="#173B33" />
    <!-- Canonical URL (update if you move to a custom domain). -->
    <link rel="canonical" href="https://skillverse-wu2i.vercel.app/" />
    <!-- Open Graph / social cards -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://skillverse-wu2i.vercel.app/" />
    <meta property="og:site_name" content="SkillVerse" />
    <meta property="og:title" content="SkillVerse — learn any skill, with people learning beside you" />
    <meta
      property="og:description"
      content="Curated roadmaps, real projects, streaks with grace, and monthly cohorts. Stop collecting tutorials — start finishing them."
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="SkillVerse — guided, social skill learning" />
    <meta
      name="twitter:description"
      content="Curated roadmaps, real projects, streaks, and monthly cohorts. Free forever."
    />
    <script>
      // Apply the saved theme before first paint to avoid a flash.
      try {
        if (localStorage.getItem("sv-theme") === "dark") {
          document.documentElement.classList.add("dark");
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
